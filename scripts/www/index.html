<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝宝识字卡</title>
<style>
* {
  margin:0; padding:0; box-sizing:border-box;
}
body {
  background:#fef8f0;
  font-family:"Microsoft YaHei", sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  padding:20px;
}
.title {
  font-size:28px;
  color:#ff6b6b;
  margin-bottom:10px;
}
.mode-bar {
  display:flex;
  gap:10px;
  margin-bottom:12px;
}
.mode-btn {
  padding:8px 16px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#cccccc;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.mode-btn.active {
  background:#ff6b6b;
}
.lib-btn {
  padding:8px 16px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#6bb8ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-bottom:20px;
}
.card {
  background:white;
  width:280px;
  height:360px;
  border-radius:24px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}
.char {
  font-size:120px;
  font-weight:bold;
  color:#333;
}
.emoji {
  font-size:60px;
}
.buttons {
  margin-top:30px;
  display:flex;
  gap:20px;
}
button {
  padding:14px 28px;
  font-size:20px;
  border:none;
  border-radius:16px;
  background:#ff9999;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:active {
  background:#ff6b6b;
}
</style>
</head>
<body>

<div class="title">宝宝识字 📚</div>

<button class="lib-btn" id="btnSwitchLib" onclick="switchLibrary()">切换到字库2</button>
<div class="mode-bar">
  <button class="mode-btn active" id="btnSeq" onclick="setMode('seq')">顺序模式</button>
  <button class="mode-btn" id="btnRand" onclick="setMode('rand')">随机模式</button>
  <button class="mode-btn" onclick="resetAll()">复位</button>
</div>



<div class="card">
  <div class="char" id="char">天</div>
  <div class="emoji" id="emoji">☁️</div>
</div>

<div class="buttons">
  <button onclick="prev()">上一页</button>
  <button onclick="next()">下一页</button>
</div>

<script>
// 字库1：你原来的
const lib1 = [
  {c:"天",e:"☁️"},{c:"地",e:"🌍"},
  {c:"上",e:"⬆️"},{c:"下",e:"⬇️"},{c:"左",e:"⬅️"},{c:"右",e:"➡️"},
  {c:"大",e:"🐘"},{c:"小",e:"🐣"},{c:"多",e:"少🎶"},{c:"少",e:"🎵"},
  {c:"人",e:"👮‍"},{c:"手",e:"✋"},{c:"足",e:"🦶"},{c:"口",e:"👄"},{c:"目",e:"👀"},{c:"鼻",e:"👃"},{c:"眼",e:"👀"},
  {c:"耳",e:"👂‍"},{c:"牙",e:"‍🦷"},
  {c:"头",e:"👶"},{c:"刀",e:"🔪"},
  {c:"心",e:"♥"},{c:"门",e:"🚪"},  {c:"车",e:"🚗"},
  {c:"日",e:"☀"},{c:"月",e:"🌙"},{c:"水",e:"💧"},{c:"火",e:"🔥"},
  {c:"花",e:"🌸"},{c:"木",e:"🌳"},{c:"雪",e:"❄️"},{c:"风",e:"💨"},
  {c:"山",e:"⛰️"},{c:"雨",e:"🌧️"},{c:"伞",e:"☂️"},
  {c:"芳",e:"🌺"},{c:"东",e:"🌅"},{c:"波",e:"🌊"},
  {c:"郭",e:"👤"},{c:"芯",e:"🌱"},{c:"田",e:"🌾"},
  {c:"一",e:"1"},{c:"二",e:"2"},{c:"三",e:"3"},{c:"四",e:"4"},{c:"五",e:"5"},{c:"六",e:"6"},{c:"七",e:"7"},{c:"八",e:"8"},{c:"九",e:"9"},{c:"十",e:"10"},
  {c:"头",e:"👧"},{c:"脚",e:"🦶"},{c:"牛",e:"🐮"},{c:"马",e:"🐴"},{c:"羊",e:"🐑"},
  {c:"鸟",e:"🐦"},{c:"鱼",e:"🐟"},{c:"虫",e:"🐛"},{c:"犬",e:"🐶"},{c:"兔",e:"🐰"},
  {c:"听",e:"👂"},{c:"说",e:"🗣️"},{c:"笑",e:"😊"},{c:"哭",e:"😭"},
  {c:"开",e:"🔓"},{c:"关",e:"🔒"},{c:"来",e:"👉"},{c:"去",e:"👈"},
];

// 字库2：我推荐的幼儿常用简单字
const lib2 = [
  {c:"一",e:"1"},{c:"二",e:"2"},{c:"三",e:"3"},{c:"四",e:"4"},{c:"五",e:"5"},
  {c:"六",e:"6"},{c:"七",e:"7"},{c:"八",e:"8"},{c:"九",e:"9"},{c:"十",e:"10"},
  {c:"上",e:"⬆️"},{c:"下",e:"⬇️"},{c:"左",e:"⬅️"},{c:"右",e:"➡️"},
  {c:"前",e:"👉"},{c:"后",e:"👈"},{c:"大",e:"🐘"},{c:"小",e:"🐣"},
  {c:"多",e:"🍬🍬"},{c:"少",e:"🍬"},{c:"天",e:"☁️"},{c:"地",e:"🌍"},
  {c:"日",e:"☀️"},{c:"月",e:"🌙"},{c:"水",e:"💧"},{c:"火",e:"🔥"},
  {c:"山",e:"⛰️"},{c:"石",e:"🪨"},{c:"田",e:"🌾"},{c:"土",e:"🌍"},
  {c:"风",e:"💨"},{c:"云",e:"☁️"},{c:"雨",e:"🌧️"},{c:"雪",e:"❄️"},
  {c:"人",e:"👶"},{c:"口",e:"👄"},{c:"耳",e:"👂"},{c:"目",e:"👀"},
  {c:"手",e:"✋"},{c:"足",e:"🦶"},{c:"头",e:"👧"},{c:"牙",e:"🦷"},
  {c:"心",e:"❤️"},{c:"爸",e:"👨"},{c:"妈",e:"👩"},{c:"爷",e:"👴"},
  {c:"奶",e:"👵"},{c:"哥",e:"👦"},{c:"姐",e:"👧"},{c:"花",e:"🌸"},
  {c:"草",e:"🌱"},{c:"木",e:"🌳"},{c:"牛",e:"🐮"},{c:"马",e:"🐴"},
  {c:"羊",e:"🐑"},{c:"鸟",e:"🐦"},{c:"鱼",e:"🐟"},{c:"虫",e:"🐛"},
  {c:"犬",e:"🐶"},{c:"门",e:"🚪"},{c:"车",e:"🚗"},{c:"伞",e:"☂️"},
  {c:"灯",e:"💡"},{c:"书",e:"📖"},{c:"开",e:"🔓"},{c:"关",e:"🔒"},
  {c:"走",e:"🚶"},{c:"跑",e:"🏃"},{c:"看",e:"👀"},{c:"听",e:"👂"},
  {c:"说",e:"🗣️"},{c:"笑",e:"😊"},{c:"吃",e:"🍚"}
];

let currentLib = lib1;
let libIndex = 1;
let index = 0;
let mode = "seq";

function show() {
  document.getElementById("char").innerText = currentLib[index].c;
  document.getElementById("emoji").innerText = currentLib[index].e;
}

function prev() {
  if (mode === "rand") return;
  index = (index - 1 + currentLib.length) % currentLib.length;
  show();
}

function next() {
  if (mode === "rand") {
    index = Math.floor(Math.random() * currentLib.length);
  } else {
    index = (index + 1) % currentLib.length;
  }
  show();
}

function setMode(m) {
  mode = m;
  document.getElementById("btnSeq").classList.remove("active");
  document.getElementById("btnRand").classList.remove("active");
  document.getElementById("btn" + (m==="seq"?"Seq":"Rand")).classList.add("active");
}

function resetAll() {
  index = 0;
  setMode("seq");
  show();
}

function switchLibrary() {
  if (libIndex === 1) {
    currentLib = lib2;
    libIndex = 2;
    document.getElementById("btnSwitchLib").innerText = "切换到字库1";
  } else {
    currentLib = lib1;
    libIndex = 1;
    document.getElementById("btnSwitchLib").innerText = "切换到字库2";
  }
  resetAll();
}

show();
</script>
</body>
</html>
